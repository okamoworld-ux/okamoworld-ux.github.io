<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>耳鼻咽喉科 患者さん向け資料</title>
<meta name="description" content="耳鼻咽喉科の生活指導・応急処置に関する患者さん向け資料を掲載しています。">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@500;700&family=Noto+Sans+JP:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f3eee2; --paper:#fbf8ef; --ink:#1a1a1a; --ink-soft:#5a5a5a;
  --accent:#1a3a5c; --accent-deep:#0d2843; --rule:#cdb98a;
}
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{
  background:var(--bg);
  background-image:
    radial-gradient(at 20% 0%, rgba(26,58,92,.04) 0%, transparent 50%),
    radial-gradient(at 80% 100%, rgba(139,30,30,.03) 0%, transparent 50%);
  color:var(--ink); font-family:"Noto Sans JP",sans-serif; font-weight:300;
  line-height:1.85; min-height:100vh; padding:4rem 1.5rem 5rem; -webkit-font-smoothing:antialiased;
}
main{max-width:1120px;margin:0 auto;}
.eyebrow{
  display:flex;align-items:center;gap:1rem;margin-bottom:2.5rem;
  font-size:.72rem;letter-spacing:.32em;color:var(--accent);font-weight:500;text-transform:uppercase;
}
.eyebrow::before,.eyebrow::after{content:"";flex:1;height:1px;background:var(--rule);}
.eyebrow span{white-space:nowrap;}
h1{font-family:"Shippori Mincho",serif;font-weight:700;font-size:clamp(1.75rem,5vw,2.5rem);
  line-height:1.45;text-align:center;margin-bottom:1rem;letter-spacing:.04em;}
.subtitle{text-align:center;font-size:.85rem;color:var(--ink-soft);margin-bottom:3rem;letter-spacing:.18em;}
.intro{font-family:"Shippori Mincho",serif;font-size:.95rem;line-height:2;text-align:center;
  color:var(--ink-soft);margin:0 auto 3rem;max-width:30em;}
.section-label{font-family:"Shippori Mincho",serif;font-size:.78rem;letter-spacing:.3em;
  color:var(--accent);text-align:center;margin-bottom:1.75rem;text-transform:uppercase;}

/* カードのグリッド：幅に応じて 2〜5 列に自動で並ぶ */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(195px,1fr));
  gap:1.5rem;
}
.card{
  display:flex;flex-direction:column;text-decoration:none;color:var(--ink);
  background:var(--paper);border:1px solid var(--rule);
  box-shadow:0 1px 0 rgba(255,255,255,.6) inset,0 14px 30px -20px rgba(26,58,92,.25);
  overflow:hidden;transition:transform .2s ease,box-shadow .2s ease;
}
.card:hover{transform:translateY(-4px);box-shadow:0 1px 0 rgba(255,255,255,.6) inset,0 22px 40px -18px rgba(26,58,92,.35);}
.card-title{
  font-family:"Shippori Mincho",serif;font-size:.92rem;font-weight:500;
  text-align:center;padding:.95rem .8rem .8rem;line-height:1.5;letter-spacing:.03em;
  border-bottom:1px solid rgba(205,185,138,.45);
}
.card-thumb{display:block;background:#fff;padding:.4rem;}
.card-thumb img{display:block;width:100%;height:auto;}

.meta{margin-top:4rem;font-size:.7rem;color:var(--ink-soft);letter-spacing:.15em;
  border-top:1px solid var(--rule);padding-top:1.25rem;text-align:center;}
.meta p{margin:.25rem 0;}
@media(max-width:480px){
  body{padding:2.5rem 1rem 4rem;}
  .grid{grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:1rem;}
}
</style>
</head>
<body>
<main>
  <p class="eyebrow"><span>耳鼻咽喉科</span></p>
  <h1>患者さん向け資料</h1>
  <p class="subtitle">PATIENT INFORMATION ARCHIVE</p>

  <p class="intro">
    診察でお渡しした資料を、ご自宅でも参照していただけます。<br>
    ご覧になりたい資料をお選びください。
  </p>

  <p class="section-label">— 掲載資料 —</p>

  <div class="grid">

    <a class="card" href="./nosebleed/">
      <span class="card-title">鼻血が出たときは</span>
      <span class="card-thumb"><img src="./nosebleed/leaflet.png" alt="鼻血が出たときの手当てと生活指導のリーフレット"></span>
    </a>

    <a class="card" href="./dizziness/">
      <span class="card-title">めまい・耳の聞こえにくさ</span>
      <span class="card-thumb"><img src="./dizziness/leaflet.png" alt="めまい・耳の聞こえにくさをくり返さないための生活指導のリーフレット"></span>
    </a>

  </div>

  <div class="meta">
    <p>本サイトの内容は一般的な情報提供を目的としています。</p>
    <p>個別の症状については主治医にご相談ください。</p>
  </div>
</main>
</body>
</html>
