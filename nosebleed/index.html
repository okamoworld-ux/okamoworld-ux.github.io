<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>鼻血が出たときの正しい止め方｜耳鼻咽喉科 患者さん向け資料</title>
<meta name="description" content="鼻血が出たときの応急処置を3ステップで解説した患者さん向けリーフレットです。">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@500;700&family=Noto+Sans+JP:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f3eee2;
  --paper: #fbf8ef;
  --ink: #1a1a1a;
  --ink-soft: #5a5a5a;
  --accent: #1a3a5c;
  --accent-deep: #0d2843;
  --rule: #cdb98a;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }
body {
  background: var(--bg);
  background-image:
    radial-gradient(at 20% 0%, rgba(26, 58, 92, 0.04) 0%, transparent 50%),
    radial-gradient(at 80% 100%, rgba(139, 30, 30, 0.03) 0%, transparent 50%);
  color: var(--ink);
  font-family: "Noto Sans JP", sans-serif;
  font-weight: 300;
  line-height: 1.85;
  min-height: 100vh;
  padding: 3rem 1.25rem 5rem;
  -webkit-font-smoothing: antialiased;
}
main { max-width: 720px; margin: 0 auto; }

.back {
  display: inline-block;
  margin-bottom: 2rem;
  font-size: 0.72rem;
  letter-spacing: 0.25em;
  color: var(--accent);
  text-decoration: none;
  font-weight: 500;
  text-transform: uppercase;
  transition: color 0.2s ease;
}
.back:hover { color: var(--accent-deep); }

.eyebrow {
  display: flex; align-items: center; gap: 1rem;
  margin-bottom: 2.5rem;
  font-size: 0.72rem; letter-spacing: 0.32em;
  color: var(--accent); font-weight: 500; text-transform: uppercase;
}
.eyebrow::before, .eyebrow::after {
  content: ""; flex: 1; height: 1px; background: var(--rule);
}
.eyebrow span { white-space: nowrap; }

h1 {
  font-family: "Shippori Mincho", serif;
  font-weight: 700;
  font-size: clamp(1.75rem, 5.5vw, 2.75rem);
  line-height: 1.45; text-align: center;
  margin-bottom: 1.25rem; letter-spacing: 0.04em;
}
.subtitle {
  text-align: center; font-size: 0.88rem;
  color: var(--ink-soft); margin-bottom: 3rem;
  letter-spacing: 0.18em;
}
.lead {
  font-family: "Shippori Mincho", serif;
  font-size: 1rem; line-height: 2;
  text-align: center; color: var(--ink-soft);
  margin: 0 auto 3rem; max-width: 28em;
  padding: 0 0.5rem;
}
.figure {
  background: var(--paper);
  padding: 1.25rem;
  border: 1px solid var(--rule);
  box-shadow:
    0 1px 0 rgba(255,255,255,0.6) inset,
    0 24px 48px -24px rgba(26, 58, 92, 0.25),
    0 8px 16px -12px rgba(0,0,0,0.1);
  position: relative;
}
.figure::before {
  content: ""; position: absolute; inset: 6px;
  border: 1px solid rgba(205, 185, 138, 0.5);
  pointer-events: none;
}
.figure img {
  display: block; width: 100%; height: auto;
  position: relative; z-index: 1;
}
.actions {
  margin-top: 2.5rem;
  display: flex; justify-content: center;
  gap: 0.75rem; flex-wrap: wrap;
}
.btn {
  display: inline-block;
  padding: 0.85rem 2.25rem;
  background: var(--accent);
  color: var(--paper);
  text-decoration: none;
  font-family: "Shippori Mincho", serif;
  font-size: 0.85rem; letter-spacing: 0.25em;
  border: none; cursor: pointer;
  transition: background 0.2s ease, transform 0.2s ease;
}
.btn:hover { background: var(--accent-deep); transform: translateY(-1px); }
.meta {
  margin-top: 3.5rem;
  display: flex; justify-content: space-between;
  align-items: baseline;
  font-size: 0.72rem; color: var(--ink-soft);
  letter-spacing: 0.15em;
  border-top: 1px solid var(--rule);
  padding-top: 1.25rem;
  flex-wrap: wrap; gap: 0.5rem;
}
@media (max-width: 480px) {
  body { padding: 2rem 1rem 4rem; }
  .figure { padding: 0.6rem; }
  .figure::before { inset: 3px; }
  .eyebrow { font-size: 0.65rem; letter-spacing: 0.25em; }
}
@media print {
  body { background: white; padding: 0; }
  .actions, .eyebrow, .meta, .back { display: none; }
  .figure { border: none; box-shadow: none; padding: 0; }
  .figure::before { display: none; }
  h1, .subtitle, .lead { display: none; }
}
</style>
</head>
<body>
<main>
  <a href="../" class="back">&larr; 資料一覧に戻る</a>

  <p class="eyebrow"><span>耳鼻咽喉科　患者さん向け資料</span></p>

  <h1>鼻血が出たときの<br>正しい止め方</h1>
  <p class="subtitle">応急処置・3ステップガイド</p>

  <p class="lead">
    鼻血の多くは、正しい方法で15分間しっかり押さえれば止まります。<br>
    まずは落ち着いて、下の手順をご覧ください。
  </p>

  <figure class="figure">
    <img src="leaflet.png" alt="鼻血が出たときの3ステップ止血法と、止血後の生活指導">
  </figure>

  <div class="actions">
    <button class="btn" onclick="window.print()">印刷する</button>
  </div>

  <div class="meta">
    <span>改訂日　2026年5月</span>
    <span>耳鼻咽喉科</span>
  </div>
</main>
</body>
</html>
